<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>جوكر</title>
<!-- ── PWA ── -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="جوكر">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0d1a;
  --surf:    #161628;
  --surf2:   #1e1e38;
  --border:  #272744;
  --primary: #e94560;
  --accent:  #4ecca3;
  --text:    #eaeaea;
  --muted:   #6b6d8a;
  --green:   #4ecca3;
  --red:     #e94560;
  --font:    'Cairo', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: var(--font);
  overflow: hidden;
  color: var(--text);
}

/* ════════════════════════════════
   SETUP SCREEN
════════════════════════════════ */
#setupScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  z-index: 500;
  transition: opacity .3s, transform .35s;
}
#setupScreen.hidden { opacity: 0; pointer-events: none; transform: scale(.97); }

.setup-header {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.setup-header-logo {
  width: 52px; height: 52px; border-radius: 16px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--primary), #ff8a75);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  box-shadow: 0 4px 20px rgba(233,69,96,.4);
}
.setup-header-title { font-size: 26px; font-weight: 900; line-height: 1; }
.setup-header-title span { color: var(--primary); }

/* COUNT */
.setup-count-wrap {
  padding: 16px 16px 0;
  flex-shrink: 0;
}
.setup-section-label {
  font-size: 11px; font-weight: 700; color: var(--muted);
  letter-spacing: 2px; text-align: center; margin-bottom: 10px;
}
.count-btns {
  display: flex; gap: 10px;
}
.count-btn {
  flex: 1; height: 54px;
  background: var(--surf2); border: 2px solid var(--border);
  border-radius: 14px; font-family: var(--font);
  font-size: 22px; font-weight: 900; color: var(--muted);
  cursor: pointer; transition: all .18s;
}
.count-btn.active {
  background: rgba(233,69,96,.18);
  border-color: var(--primary);
  color: var(--primary);
}
.count-btn:active { transform: scale(.93); }

/* NAMES */
.setup-names-wrap {
  flex: 1; display: flex; flex-direction: column;
  padding: 14px 16px 0;
  min-height: 0;
}
.name-inputs {
  flex: 1; display: flex; flex-direction: column; gap: 8px;
  min-height: 0;
}
.name-row {
  flex: 1; display: flex; align-items: center; gap: 14px;
  background: var(--surf2); border: 2px solid var(--border);
  border-radius: 14px; padding: 0 18px;
  transition: border-color .2s; min-height: 0;
}
.name-row:focus-within { border-color: var(--accent); }
.name-emoji { font-size: 22px; flex-shrink: 0; }
.name-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--font); font-size: 16px; font-weight: 700;
  color: var(--text); text-align: right; height: 100%;
}
.name-input::placeholder { color: var(--muted); }

/* START BUTTON */
.setup-footer {
  padding: 14px 16px 20px; flex-shrink: 0;
}
.btn-start {
  width: 100%; height: 56px; border: none;
  background: linear-gradient(135deg, var(--primary), #ff8a75);
  border-radius: 16px; font-family: var(--font);
  font-size: 18px; font-weight: 900; color: #fff;
  cursor: pointer; transition: all .18s;
  box-shadow: 0 6px 24px rgba(233,69,96,.4);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-start:active { transform: scale(.97); opacity: .9; }


/* ════════════════════════════════
   GAME SCREEN
════════════════════════════════ */
#gameScreen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
}

/* App Bar */
.app-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px;
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
}
.app-bar::after {
  content:''; position:absolute; bottom:0; left:0; right:0;
  height: 2px; background: linear-gradient(90deg, var(--primary), var(--accent));
}
.app-bar-title { display:flex; align-items:center; gap:10px; font-size:20px; font-weight:900; }
.app-logo {
  width:34px; height:34px; border-radius:10px;
  background:linear-gradient(135deg,var(--primary),#ff8a75);
  display:flex; align-items:center; justify-content:center; font-size:18px;
}
.icon-btn {
  width:38px; height:38px; border:none;
  background:var(--surf2); border-radius:11px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:17px;
  transition:all .15s;
}
.icon-btn:active { transform:scale(.88); }

/* Scrollable content */
.game-content { flex:1; overflow-y:auto; overflow-x:hidden; }
.game-content::-webkit-scrollbar { width:2px; }
.game-content::-webkit-scrollbar-thumb { background:var(--border); }

/* Players row */
.sec-label {
  padding: 14px 16px 8px;
  font-size: 10px; font-weight: 700; color: var(--muted);
  letter-spacing: 2px;
}
.players-row {
  display: flex; gap: 10px;
  padding: 0 16px 14px;
  overflow-x: auto; scrollbar-width: none;
}
.players-row::-webkit-scrollbar { display: none; }
.player-chip {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  flex-shrink: 0;
}
.player-avatar {
  width: 50px; height: 50px; border-radius: 14px;
  background: var(--surf2); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.player-name-disp {
  font-size: 12px; font-weight: 700; color: var(--text);
  max-width: 60px; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Table */
.table-wrap {
  margin: 0 12px 12px;
  border-radius: 14px; overflow: hidden;
  border: 1px solid var(--border);
  overflow-x: auto;
}
.table-wrap::-webkit-scrollbar { height: 2px; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--border); }
table { width: 100%; border-collapse: collapse; }
thead th { background: var(--surf) !important; z-index: 5 !important; }
thead th:first-child, tbody td:first-child {
  position: sticky; left: 0; z-index: 4; background: var(--surf);
}
th {
  padding: 10px 5px; font-size: 12px; font-weight: 700;
  color: var(--muted); border-bottom: 1px solid var(--border);
  text-align: center; white-space: nowrap;
}
th:first-child { width: 32px; min-width: 32px; padding-right: 10px; text-align: right; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:nth-child(odd) { background: rgba(255,255,255,.013); }
td { padding: 6px 4px; text-align: center; vertical-align: middle; }
td:first-child {
  font-size: 14px; font-weight: 700; color: var(--muted);
  width: 32px; min-width: 32px; padding: 6px 8px;
}

/* Score Bubble */
.score-bubble {
  min-width: 52px; height: 34px;
  border-radius: 10px;
  background: var(--surf2); border: 1.5px dashed var(--border);
  display: flex; align-items: center; justify-content: center; gap: 3px;
  font-size: 13px; font-weight: 700; color: var(--muted);
  cursor: pointer; padding: 0 6px; margin: 0 auto;
  transition: all .15s;
}
.score-bubble:active { transform: scale(.87); }
.score-bubble.is-add { background: rgba(78,204,163,.14); border: 1.5px solid rgba(78,204,163,.35); color: var(--green); }
.score-bubble.is-sub { background: rgba(233,69,96,.14); border: 1.5px solid rgba(233,69,96,.35); color: var(--red); }
.op-badge { font-size: 10px; font-weight: 900; line-height: 1; }
.score-val { font-size: 13px; font-weight: 800; }

/* Bottom Nav */
.bottom-nav {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px 14px;
  background: var(--surf); border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.save-dot-wrap { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.save-dot { width:7px; height:7px; border-radius:50%; background:var(--border); transition:background .4s; }
.save-dot.on { background:var(--accent); }
.save-label { font-size:11px; font-weight:600; color:var(--muted); }
.btn-results {
  flex:1; height:42px; border:none;
  background:linear-gradient(135deg,var(--primary),#ff8a75);
  border-radius:12px; color:#fff; font-family:var(--font);
  font-weight:800; font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all .15s; box-shadow:0 3px 14px rgba(233,69,96,.35);
}
.btn-results:active { transform:scale(.97); }


/* ════════════════════════════════
   BOTTOM SHEET
════════════════════════════════ */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65);
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s;
}
.overlay.show { opacity: 1; pointer-events: all; }

.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surf);
  border-radius: 22px 22px 0 0;
  z-index: 101;
  transform: translateY(110%);
  transition: transform .32s cubic-bezier(.34,1.4,.64,1);
  padding: 0 0 32px;
  border-top: 1px solid var(--border);
}
.bottom-sheet.show { transform: translateY(0); }

.sheet-handle {
  width: 40px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 12px auto 16px;
}
.sheet-ctx {
  padding: 0 20px 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.sheet-round { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; }
.sheet-player { font-size: 18px; font-weight: 900; margin-top: 3px; }
.btn-clear-cell {
  height: 34px; padding: 0 14px;
  border: 1.5px solid var(--border); background: transparent;
  border-radius: 10px; cursor: pointer; color: var(--muted);
  font-family: var(--font); font-size: 12px; font-weight: 700;
  transition: all .15s; display: none; align-items: center; gap: 5px;
}
.btn-clear-cell.visible { display: flex; }
.btn-clear-cell:active { border-color: var(--red); color: var(--red); }

/* Op choice */
.op-choice { display: flex; gap: 12px; padding: 0 20px; }
.op-btn {
  flex: 1; height: 80px; border: none; border-radius: 16px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  cursor: pointer; font-family: var(--font); font-weight: 900; font-size: 15px;
  transition: all .15s;
}
.op-btn:active { transform: scale(.93); }
.op-btn-add { background: rgba(78,204,163,.16); border: 2px solid rgba(78,204,163,.4); color: var(--green); }
.op-btn-sub { background: rgba(233,69,96,.16); border: 2px solid rgba(233,69,96,.4); color: var(--red); }
.op-icon { font-size: 28px; font-weight: 900; line-height: 1; }

/* Num step */
.num-step { padding: 0 20px; display: none; }
.num-step.active { display: block; }
.sel-op-badge {
  display: inline-flex; align-items: center;
  background: rgba(255,255,255,.07); border-radius: 8px;
  padding: 5px 14px; font-size: 13px; font-weight: 700; margin-bottom: 14px;
}
.sel-op-badge.add { color: var(--green); }
.sel-op-badge.sub { color: var(--red); }

/* Preset buttons */
.preset-btns {
  display: none; gap: 12px; margin-bottom: 12px;
}
.preset-btn {
  flex: 1; height: 52px; border: none; border-radius: 13px;
  background: rgba(233,69,96,.16); border: 2px solid rgba(233,69,96,.4);
  color: var(--red); font-family: var(--font); font-weight: 900; font-size: 18px;
  cursor: pointer; transition: all .15s;
}
.preset-btn:active { transform: scale(.93); background: rgba(233,69,96,.28); }

.num-input-big {
  width: 100%; background: var(--surf2); border: 2px solid var(--border);
  border-radius: 14px; color: var(--text); font-family: var(--font);
  font-size: 30px; font-weight: 800; text-align: center; padding: 14px;
  outline: none; transition: border-color .2s; -webkit-appearance: none;
}
.num-input-big.add:focus { border-color: var(--green); }
.num-input-big.sub:focus { border-color: var(--red); }

.sheet-actions { display: flex; gap: 10px; margin-top: 12px; }
.btn-back {
  width: 50px; height: 50px; border: none; background: var(--surf2);
  border-radius: 13px; color: var(--muted); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.btn-back:active { transform: scale(.9); }
.btn-confirm {
  flex: 1; height: 50px; border: none; border-radius: 13px;
  color: #fff; font-family: var(--font); font-weight: 900; font-size: 16px;
  cursor: pointer; transition: all .15s;
}
.btn-confirm.add { background: linear-gradient(135deg, #4ecca3, #26d0ce); }
.btn-confirm.sub { background: linear-gradient(135deg, var(--primary), #ff8a75); }
.btn-confirm:active { transform: scale(.97); }


/* ════════════════════════════════
   RESULTS
════════════════════════════════ */
.results-overlay {
  position: fixed; inset: 0;
  background: rgba(5,5,15,.92);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .3s;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.results-overlay.show { opacity: 1; pointer-events: all; }
.results-panel {
  width: calc(100% - 32px); max-width: 420px;
  background: var(--surf); border: 1px solid var(--border); border-radius: 24px;
  padding: 24px 18px 26px;
  transform: translateY(50px) scale(.9);
  transition: transform .38s cubic-bezier(.34,1.4,.64,1);
}
.results-overlay.show .results-panel { transform: translateY(0) scale(1); }
.results-title { text-align:center; font-size:14px; font-weight:700; color:var(--muted); letter-spacing:2px; margin-bottom:20px; }
.results-list { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
.result-row {
  display:flex; align-items:center; gap:12px;
  background:var(--surf2); border-radius:14px; padding:13px 16px;
  opacity:0; transform:translateY(14px); transition:opacity .3s, transform .35s;
}
.result-row.in { opacity:1; transform:translateY(0); }
.result-rank { font-size:20px; width:28px; text-align:center; flex-shrink:0; }
.result-name { flex:1; font-size:14px; font-weight:700; }
.result-score { font-size:18px; font-weight:900; }
.result-score.pos { color:var(--green); }
.result-score.neg { color:var(--red); }
.result-score.zero { color:var(--muted); }
.result-bar-wrap { width:100%; height:3px; background:var(--border); border-radius:2px; margin-top:7px; }
.result-bar { height:3px; border-radius:2px; transition:width .6s ease; }
.btn-close-results {
  width:100%; height:46px; border:none; background:var(--surf2);
  border-radius:13px; color:var(--muted); font-family:var(--font);
  font-weight:700; font-size:15px; cursor:pointer; transition:all .15s;
}
.btn-close-results:active { transform:scale(.97); }

/* ════════════════════════════════
   RESET DIALOG
════════════════════════════════ */
.dialog-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.75);
  z-index: 300; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.dialog-backdrop.show { opacity: 1; pointer-events: all; }
.dialog {
  background: var(--surf); border-radius: 20px; padding: 24px;
  width: calc(100% - 48px); max-width: 340px;
  border: 1px solid var(--border);
  transform: scale(.85); transition: transform .2s;
}
.dialog-backdrop.show .dialog { transform: scale(1); }
.dialog h3 { font-size: 17px; font-weight: 900; margin-bottom: 8px; }
.dialog p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
.dialog-btns { display: flex; gap: 10px; }
.dialog-btns button {
  flex: 1; height: 44px; border: none; border-radius: 12px;
  font-family: var(--font); font-weight: 700; font-size: 14px; cursor: pointer; transition: all .15s;
}
.dialog-btns button:active { transform: scale(.95); }
.btn-cancel-d { background: var(--surf2); color: var(--muted); }
.btn-reset-d  { background: var(--primary); color: #fff; }

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surf2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 20px; border-radius: 12px;
  font-size: 13px; font-weight: 700; z-index: 600;
  opacity: 0; pointer-events: none; transition: all .28s; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ════ SETUP SCREEN ════ -->
<div id="setupScreen">
  <div class="setup-header">
    <div class="setup-header-logo">🃏</div>
    <div class="setup-header-title">لعبة <span>جوكر</span></div>
  </div>

  <div class="setup-count-wrap">
    <div class="setup-section-label">كام لاعب؟</div>
    <div class="count-btns">
      <button class="count-btn" onclick="selectCount(2)">٢</button>
      <button class="count-btn" onclick="selectCount(3)">٣</button>
      <button class="count-btn" onclick="selectCount(4)">٤</button>
      <button class="count-btn" onclick="selectCount(5)">٥</button>
    </div>
  </div>

  <div class="setup-names-wrap">
    <div class="setup-section-label">أسماء اللاعبين</div>
    <div class="name-inputs" id="nameInputs"></div>
  </div>

  <div class="setup-footer">
    <button class="btn-start" onclick="startGame()">🎮 ابدأ اللعبة</button>
  </div>
</div>

<!-- ════ GAME SCREEN ════ -->
<div id="gameScreen" style="display:none">
  <div class="app-bar">
    <div class="app-bar-title">
      <div class="app-logo">🃏</div>
      الجوكر
    </div>
    <button class="icon-btn" onclick="showResetDialog()">🗑️</button>
  </div>

  <div class="game-content">
    <div class="sec-label">اللاعبون</div>
    <div class="players-row" id="playersRow"></div>
    <div class="sec-label">الأدوار</div>
    <div class="table-wrap">
      <table>
        <thead><tr id="tableHeader"><th>#</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="save-dot-wrap">
      <div class="save-dot" id="saveDot"></div>
      <span class="save-label" id="saveLabel">محفوظ</span>
    </div>
    <button class="btn-results" onclick="showResults()">🏆 عرض النتائج</button>
  </div>
</div>

<!-- ════ BOTTOM SHEET ════ -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-ctx">
    <div>
      <div class="sheet-round" id="sheetRound"></div>
      <div class="sheet-player" id="sheetPlayer"></div>
    </div>
    <button class="btn-clear-cell" id="btnClearCell" onclick="clearCell()">🗑️ مسح</button>
  </div>
  <div class="op-choice" id="opStep">
    <button class="op-btn op-btn-add" onclick="selectOp('add')">
      <span class="op-icon">+</span>جمع
    </button>
    <button class="op-btn op-btn-sub" onclick="selectOp('sub')">
      <span class="op-icon">−</span>طرح
    </button>
  </div>
  <div class="num-step" id="numStep">
    <div class="sel-op-badge" id="opBadge"></div>
    <div class="preset-btns" id="presetBtns">
      <button class="preset-btn" onclick="applyPreset(30)">− 30</button>
      <button class="preset-btn" onclick="applyPreset(60)">− 60</button>
    </div>
    <input type="number" id="numInput" class="num-input-big" placeholder="0" inputmode="numeric" min="0">
    <div class="sheet-actions">
      <button class="btn-back" onclick="backToOpStep()">←</button>
      <button class="btn-confirm" id="confirmBtn" onclick="confirmScore()">تأكيد ✓</button>
    </div>
  </div>
</div>

<!-- ════ RESULTS ════ -->
<div class="results-overlay" id="resultsOverlay">
  <div class="results-panel">
    <div class="results-title">🏆 نتائج المباراة</div>
    <div class="results-list" id="resultsList"></div>
    <button class="btn-close-results" onclick="hideResults()">✕ إغلاق</button>
  </div>
</div>

<!-- ════ RESET DIALOG ════ -->
<div class="dialog-backdrop" id="resetDialog">
  <div class="dialog">
    <h3>⚠️ إعادة تعيين</h3>
    <p>هيتم مسح كل النتائج والأسماء. مش هيرجع تاني!</p>
    <div class="dialog-btns">
      <button class="btn-cancel-d" onclick="hideResetDialog()">إلغاء</button>
      <button class="btn-reset-d"  onclick="confirmReset()">امسح كل حاجة</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const NUM_R    = 7;
const EMOJIS   = ['😎','🎯','🃏','⚡','🔥'];
const R_LABELS = ['١','٢','٣','٤','٥','٦','٧'];
const RANK_ICO = ['🥇','🥈','🥉','4️⃣','5️⃣'];
const STORE    = 'joker_v5';

let state       = null;
let currentCell = null;
let currentOp   = null;
let setupCount  = 3;

/* ── SETUP ── */
function initSetup() {
  setupCount = 3;
  renderCountBtns();
  renderNameInputs();
}

function renderCountBtns() {
  document.querySelectorAll('.count-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i + 2) === setupCount);
  });
}

function selectCount(n) {
  setupCount = n;
  renderCountBtns();
  renderNameInputs();
}

function renderNameInputs() {
  const c = document.getElementById('nameInputs');
  const prev = [...c.querySelectorAll('.name-input')].map(i => i.value);
  c.innerHTML = '';
  for(let i = 0; i < setupCount; i++) {
    const row = document.createElement('div');
    row.className = 'name-row';
    row.innerHTML = `
      <span class="name-emoji">${EMOJIS[i]}</span>
      <input class="name-input" type="text"
        placeholder="اسم اللاعب ${i+1}"
        maxlength="12" value="${prev[i]||''}" autocomplete="off">
    `;
    c.appendChild(row);
  }
}

function startGame() {
  const inputs = [...document.querySelectorAll('#nameInputs .name-input')];
  const players = inputs.map((inp, i) => inp.value.trim() || `اللاعب ${i+1}`);
  state = {
    setupDone: true, numPlayers: setupCount, players,
    scores: Array.from({length:NUM_R}, () =>
      Array.from({length:setupCount}, () => ({op:null, val:null}))
    )
  };
  save();
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('gameScreen').style.display = 'flex';
  build();
}

function showSetup() {
  document.getElementById('gameScreen').style.display = 'none';
  initSetup();
  document.getElementById('setupScreen').classList.remove('hidden');
}

/* ── STORAGE ── */
function save() {
  try { localStorage.setItem(STORE, JSON.stringify(state)); } catch(e){}
  const dot = document.getElementById('saveDot');
  const lbl = document.getElementById('saveLabel');
  dot.classList.add('on'); lbl.textContent = 'تم الحفظ ✓';
  clearTimeout(save._t);
  save._t = setTimeout(() => { dot.classList.remove('on'); lbl.textContent = 'محفوظ'; }, 2000);
}

function load() {
  try {
    const r = localStorage.getItem(STORE);
    if(r) { const d = JSON.parse(r); if(d?.setupDone && d.players && d.scores) { state = d; return; } }
  } catch(e){}
  state = null;
}

/* ── BUILD UI ── */
function build() {
  const row = document.getElementById('playersRow');
  row.innerHTML = '';
  state.players.forEach((name, pi) => {
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.innerHTML = `<div class="player-avatar">${EMOJIS[pi]}</div><div class="player-name-disp">${name}</div>`;
    row.appendChild(chip);
  });

  const hdr = document.getElementById('tableHeader');
  while(hdr.children.length > 1) hdr.removeChild(hdr.lastChild);
  state.players.forEach((name, pi) => {
    const th = document.createElement('th');
    th.dataset.pi = pi; th.textContent = name; hdr.appendChild(th);
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  R_LABELS.forEach((lbl, ri) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${lbl}</td>`;
    state.players.forEach((_, pi) => {
      const td = document.createElement('td');
      td.appendChild(makeBubble(ri, pi));
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function makeBubble(ri, pi) {
  const s = state.scores[ri][pi];
  const el = document.createElement('div');
  el.id = `c-${ri}-${pi}`;
  el.className = 'score-bubble' + (s.op==='add'?' is-add':s.op==='sub'?' is-sub':'');
  renderBubble(el, s, ri);
  el.addEventListener('click', () => openSheet(ri, pi));
  return el;
}

/* ── MULTIPLIER LOGIC ── */
function getRoundMultiplier(ri) {
  const sub = state.scores[ri].find(s => s.op === 'sub' && s.val !== null);
  return (sub && sub.val === 60) ? 2 : 1;
}

function renderBubble(el, s, ri) {
  if(!s.op) {
    el.innerHTML = `<span style="opacity:.25;font-size:14px">+</span>`;
    return;
  }
  if(s.op === 'add' && ri !== undefined && s.val !== null) {
    const mult = getRoundMultiplier(ri);
    const display = s.val * mult;
    const tag = mult === 2 ? `<span style="font-size:9px;opacity:.65;margin-right:1px">x2</span>` : '';
    el.innerHTML = `<span class="op-badge">+</span><span class="score-val">${display}</span>${tag}`;
  } else {
    const v = s.val !== null ? `<span class="score-val">${s.val}</span>` : '';
    el.innerHTML = `<span class="op-badge">${s.op==='add'?'+':'−'}</span>${v}`;
  }
}

function refreshBubble(ri, pi) {
  const el = document.getElementById(`c-${ri}-${pi}`);
  if(!el) return;
  const s = state.scores[ri][pi];
  el.className = 'score-bubble'+(s.op==='add'?' is-add':s.op==='sub'?' is-sub':'');
  renderBubble(el, s, ri);
}

function refreshRoundAddBubbles(ri) {
  state.scores[ri].forEach((s, pi) => {
    if(s.op === 'add') refreshBubble(ri, pi);
  });
}

/* ── ROUND LOGIC ── */
function roundHasSub(ri, exceptPi) {
  return state.scores[ri].some((s, pi) => pi !== exceptPi && s.op === 'sub');
}

function autoAddRestOfRound(ri, subPi) {
  let changed = false;
  state.scores[ri].forEach((s, pi) => {
    if(pi !== subPi && s.op === null) {
      state.scores[ri][pi] = {op:'add', val:null};
      refreshBubble(ri, pi);
      changed = true;
    }
  });
  if(changed) save();
}

/* ── SHEET ── */
function openSheet(ri, pi) {
  currentCell = {ri, pi}; currentOp = null;
  document.getElementById('sheetRound').textContent  = `الدور ${R_LABELS[ri]}`;
  document.getElementById('sheetPlayer').textContent = state.players[pi];
  const existing = state.scores[ri][pi];
  document.getElementById('btnClearCell').className =
    'btn-clear-cell' + (existing.op !== null ? ' visible' : '');
  if(existing.op !== null) {
    currentOp = existing.op;
    showNumStep(existing.val !== null ? existing.val : '');
  } else if(roundHasSub(ri, pi)) {
    currentOp = 'add'; showNumStep('');
  } else {
    showOpStep();
  }
  document.getElementById('overlay').classList.add('show');
  document.getElementById('bottomSheet').classList.add('show');
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('bottomSheet').classList.remove('show');
  currentCell = null; currentOp = null;
}

function clearCell() {
  if(!currentCell) return;
  const {ri,pi} = currentCell;
  state.scores[ri][pi] = {op:null, val:null};
  refreshBubble(ri, pi);
  save(); closeSheet(); showToast('🗑️ تم مسح الخانة');
}

function showOpStep() {
  document.getElementById('opStep').style.display = 'flex';
  document.getElementById('numStep').classList.remove('active');
}

function selectOp(op) { currentOp = op; showNumStep(''); }

function showNumStep(prefill) {
  document.getElementById('opStep').style.display = 'none';
  document.getElementById('numStep').classList.add('active');
  const isAdd = currentOp === 'add';
  const badge = document.getElementById('opBadge');
  const inp   = document.getElementById('numInput');
  const btn   = document.getElementById('confirmBtn');
  badge.className = `sel-op-badge ${isAdd?'add':'sub'}`;
  const isAutoAdd = isAdd && currentCell && roundHasSub(currentCell.ri, currentCell.pi);
  badge.textContent = isAdd ? (isAutoAdd ? '+ جمع (تلقائي)' : '+ جمع') : '− طرح';
  inp.className = `num-input-big ${isAdd?'add':'sub'}`;
  btn.className = `btn-confirm ${isAdd?'add':'sub'}`;
  inp.value = prefill !== '' ? prefill : '';
  document.getElementById('presetBtns').style.display = isAdd ? 'none' : 'flex';
  setTimeout(() => { inp.focus(); if(prefill !== '') inp.select(); }, 80);
}

function applyPreset(val) {
  document.getElementById('numInput').value = val;
  confirmScore();
}

function backToOpStep() { currentOp = null; showOpStep(); }

function confirmScore() {
  if(!currentCell) return;
  const {ri,pi} = currentCell;
  const raw = document.getElementById('numInput').value.trim();
  if(raw===''||isNaN(raw)) { showToast('⚠️ ادخل رقم'); return; }
  state.scores[ri][pi] = {op:currentOp, val:parseFloat(raw)};
  refreshBubble(ri, pi);
  if(currentOp === 'sub') {
    autoAddRestOfRound(ri, pi);
    refreshRoundAddBubbles(ri); // update x2 display
  }
  save(); closeSheet();
}

document.getElementById('numInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') confirmScore();
});

/* ── RESULTS ── */
function showResults() {
  const sorted = state.players.map((name, pi) => {
    let t = 0, hasData = false;
    state.scores.forEach((row, ri) => {
      const s = row[pi];
      if(s.op!==null && s.val!==null) {
        const mult = s.op === 'add' ? getRoundMultiplier(ri) : 1;
        t += s.op==='add' ? s.val * mult : -s.val;
        hasData = true;
      }
    });
    return {name, total:t, hasData};
  }).filter(x => x.hasData).sort((a,b) => a.total - b.total);

  if(!sorted.length) { showToast('⚠️ مفيش بيانات لحد لسه'); return; }
  const maxAbs = Math.max(...sorted.map(x=>Math.abs(x.total)), 1);
  const list = document.getElementById('resultsList');
  list.innerHTML = '';
  sorted.forEach((item, idx) => {
    const cls = item.total>0?'pos':item.total<0?'neg':'zero';
    const sign = item.total>0?'+':'';
    const barClr = idx===0?'var(--green)':idx===sorted.length-1?'var(--red)':'var(--accent)';
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = `
      <span class="result-rank">${RANK_ICO[idx]||'🎮'}</span>
      <div style="flex:1">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="result-name">${item.name}</span>
          <span class="result-score ${cls}">${sign}${item.total}</span>
        </div>
        <div class="result-bar-wrap"><div class="result-bar" id="bar-${idx}" style="width:0%;background:${barClr}"></div></div>
      </div>`;
    list.appendChild(row);
  });
  document.getElementById('resultsOverlay').classList.add('show');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    list.querySelectorAll('.result-row').forEach((el,i)=>{
      setTimeout(()=>{
        el.classList.add('in');
        const bar=document.getElementById(`bar-${i}`);
        if(bar) bar.style.width = Math.round((Math.abs(sorted[i].total)/maxAbs)*100)+'%';
      }, i*80);
    });
  }));
}

function hideResults() { document.getElementById('resultsOverlay').classList.remove('show'); }
document.getElementById('resultsOverlay').addEventListener('click', e => {
  if(e.target === document.getElementById('resultsOverlay')) hideResults();
});

/* ── RESET ── */
function showResetDialog() { document.getElementById('resetDialog').classList.add('show'); }
function hideResetDialog() { document.getElementById('resetDialog').classList.remove('show'); }
function confirmReset() {
  state = null;
  try { localStorage.removeItem(STORE); } catch(e){}
  hideResetDialog();
  showSetup();
  showToast('🗑️ تم مسح كل حاجة');
}

/* ── TOAST ── */
let _tt = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 2000);
}

/* ── INIT ── */
load();
if(state?.setupDone) {
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('gameScreen').style.display = 'flex';
  document.getElementById('gameScreen').style.flexDirection = 'column';
  build();
} else {
  initSetup();
}

/* ── PWA: تسجيل الـ Service Worker ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
